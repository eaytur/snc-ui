<svg width="560" height="412" xmlns="http://www.w3.org/2000/svg">
  <rect width="560" height="412" fill="#F0F2F5" rx="14"/>

  <!-- ACCENT -->
  <text x="16" y="30" fill="#718096" font-family="system-ui,-apple-system,sans-serif" font-size="10" letter-spacing="1.8" font-weight="600">ACCENT</text>
  <rect x="16"  y="40" width="120" height="54" fill="#CC9E00" rx="8"/>
  <rect x="146" y="40" width="120" height="54" fill="#B88A00" rx="8"/>
  <rect x="276" y="40" width="120" height="54" fill="#CC6A00" rx="8"/>
  <rect x="406" y="40" width="138" height="54" fill="#CC4400" rx="8"/>
  <text x="16"  y="110" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">yellow</text>
  <text x="146" y="110" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">amber</text>
  <text x="276" y="110" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">orange</text>
  <text x="406" y="110" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">accent</text>
  <text x="16"  y="124" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#CC9E00</text>
  <text x="146" y="124" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#B88A00</text>
  <text x="276" y="124" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#CC6A00</text>
  <text x="406" y="124" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#CC4400</text>

  <!-- SURFACE -->
  <text x="16" y="158" fill="#718096" font-family="system-ui,-apple-system,sans-serif" font-size="10" letter-spacing="1.8" font-weight="600">SURFACE</text>
  <rect x="16"  y="168" width="120" height="54" fill="#F0F2F5" rx="8" stroke="#DEE2E8" stroke-width="1"/>
  <rect x="146" y="168" width="120" height="54" fill="#FFFFFF"  rx="8" stroke="#DEE2E8" stroke-width="1"/>
  <rect x="276" y="168" width="120" height="54" fill="#F5F7FA"  rx="8" stroke="#DEE2E8" stroke-width="1"/>
  <rect x="406" y="168" width="138" height="54" fill="#DEE2E8"  rx="8"/>
  <text x="16"  y="238" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">background</text>
  <text x="146" y="238" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">surface</text>
  <text x="276" y="238" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">surfaceAlt</text>
  <text x="406" y="238" fill="#111318" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">border</text>
  <text x="16"  y="252" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#F0F2F5</text>
  <text x="146" y="252" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#FFFFFF</text>
  <text x="276" y="252" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#F5F7FA</text>
  <text x="406" y="252" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#DEE2E8</text>

  <!-- TEXT -->
  <text x="16" y="286" fill="#718096" font-family="system-ui,-apple-system,sans-serif" font-size="10" letter-spacing="1.8" font-weight="600">TEXT</text>
  <rect x="16"  y="296" width="166" height="54" fill="#111318" rx="8"/>
  <rect x="192" y="296" width="166" height="54" fill="#4A5568" rx="8"/>
  <rect x="368" y="296" width="176" height="54" fill="#718096" rx="8"/>
  <text x="16"  y="366" fill="#F0F2F5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">textPrimary</text>
  <text x="192" y="366" fill="#F0F2F5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">textSecondary</text>
  <text x="368" y="366" fill="#F0F2F5" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="500">textMuted</text>
  <text x="16"  y="380" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#111318</text>
  <text x="192" y="380" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#4A5568</text>
  <text x="368" y="380" fill="#718096" font-family="ui-monospace,monospace" font-size="11">#718096</text>
